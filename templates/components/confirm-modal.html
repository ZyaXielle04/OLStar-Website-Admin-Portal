<!-- templates/components/confirm-modal.html -->
<div id="confirmModal" class="modal-overlay" style="display: none;">
    <div class="confirm-modal">
        <div class="confirm-modal-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h3 id="confirmModalTitle" class="confirm-modal-title">Confirm Action</h3>
        <p id="confirmModalMessage" class="confirm-modal-message">Are you sure you want to proceed?</p>
        <div class="confirm-modal-buttons">
            <button id="confirmModalCancel" class="btn-confirm-cancel">
                <i class="fas fa-times"></i> Cancel
            </button>
            <button id="confirmModalConfirm" class="btn-confirm-danger">
                <i class="fas fa-trash"></i> Delete
            </button>
        </div>
    </div>
</div>

<style>
/* Confirmation Modal Styles */
.confirm-modal {
    background: linear-gradient(145deg, #FFFFFF 0%, #F8FAFC 100%);
    border-radius: 32px;
    padding: 2rem;
    max-width: 400px;
    width: 90%;
    border: 1px solid #E2E8F0;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    text-align: center;
    animation: slideUp 0.3s ease;
}

.confirm-modal-icon {
    width: 70px;
    height: 70px;
    background: #FEF2F2;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
}

.confirm-modal-icon i {
    font-size: 2.5rem;
    color: #DC2626;
}

.confirm-modal-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: #1E293B;
    margin-bottom: 0.75rem;
}

.confirm-modal-message {
    color: #475569;
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 1.5rem;
}

.confirm-modal-buttons {
    display: flex;
    gap: 1rem;
    justify-content: center;
}

.btn-confirm-cancel,
.btn-confirm-danger,
.btn-confirm-warning {
    padding: 0.7rem 1.5rem;
    border-radius: 40px;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-confirm-cancel {
    background: #F1F5F9;
    color: #475569;
    border: 1px solid #E2E8F0;
}

.btn-confirm-cancel:hover {
    background: #E2E8F0;
    transform: translateY(-1px);
}

.btn-confirm-danger {
    background: #DC2626;
    color: white;
}

.btn-confirm-danger:hover {
    background: #B91C1C;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
}

@keyframes slideUp {
    from {
        transform: translateY(30px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}
</style>

<script>
// Confirmation Modal System
(function() {
    let confirmCallback = null;
    
    window.showConfirmModal = function(options) {
        const modal = document.getElementById('confirmModal');
        const titleEl = document.getElementById('confirmModalTitle');
        const messageEl = document.getElementById('confirmModalMessage');
        const confirmBtn = document.getElementById('confirmModalConfirm');
        const cancelBtn = document.getElementById('confirmModalCancel');
        
        // Set content
        titleEl.textContent = options.title || 'Confirm Action';
        messageEl.textContent = options.message || 'Are you sure you want to proceed?';
        
        // Set button text and style
        if (options.confirmText) {
            confirmBtn.innerHTML = `<i class="fas ${options.confirmIcon || 'fa-trash'}"></i> ${options.confirmText}`;
        } else {
            confirmBtn.innerHTML = '<i class="fas fa-trash"></i> Delete';
        }
        
        if (options.cancelText) {
            cancelBtn.innerHTML = `<i class="fas fa-times"></i> ${options.cancelText}`;
        } else {
            cancelBtn.innerHTML = '<i class="fas fa-times"></i> Cancel';
        }
        
        // Set button color based on action type
        if (options.type === 'warning') {
            confirmBtn.className = 'btn-confirm-warning';
        } else if (options.type === 'info') {
            confirmBtn.className = 'btn-confirm-info';
        } else {
            confirmBtn.className = 'btn-confirm-danger';
        }
        
        // Store callback
        confirmCallback = options.onConfirm;
        
        // Show modal
        modal.style.display = 'flex';
        
        // Handle confirm
        const onConfirm = () => {
            if (confirmCallback) confirmCallback();
            closeModal();
        };
        
        // Handle cancel
        const onCancel = () => {
            if (options.onCancel) options.onCancel();
            closeModal();
        };
        
        // Add event listeners
        confirmBtn.onclick = onConfirm;
        cancelBtn.onclick = onCancel;
        
        // Close on overlay click
        modal.onclick = (e) => {
            if (e.target === modal) {
                onCancel();
            }
        };
    };
    
    function closeModal() {
        const modal = document.getElementById('confirmModal');
        modal.style.display = 'none';
        confirmCallback = null;
    }
})();
</script>
