<!-- templates/components/toast.html -->
<div class="toast-container" id="toastContainer"></div>

<script>
// Toast notification system - Reusable across all pages
(function() {
    // Ensure toast container exists
    function ensureToastContainer() {
        let container = document.getElementById('toastContainer');
        if (!container) {
            container = document.createElement('div');
            container.className = 'toast-container';
            container.id = 'toastContainer';
            document.body.appendChild(container);
        }
        return container;
    }

    // Show toast notification
    window.showToast = function(title, message, type = 'success', duration = 5000) {
        const container = ensureToastContainer();
        
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        
        let icon = '';
        if (type === 'success') {
            icon = '<i class="fas fa-check-circle"></i>';
        } else if (type === 'error') {
            icon = '<i class="fas fa-exclamation-circle"></i>';
        } else if (type === 'warning') {
            icon = '<i class="fas fa-exclamation-triangle"></i>';
        } else {
            icon = '<i class="fas fa-info-circle"></i>';
        }
        
        toast.innerHTML = `
            <div class="toast-icon">${icon}</div>
            <div class="toast-content">
                <div class="toast-title">${title}</div>
                <div class="toast-message">${message}</div>
            </div>
            <button class="toast-close"><i class="fas fa-times"></i></button>
        `;
        
        container.appendChild(toast);
        
        // Add close button functionality
        const closeBtn = toast.querySelector('.toast-close');
        closeBtn.addEventListener('click', () => {
            toast.classList.add('toast-exit');
            setTimeout(() => toast.remove(), 300);
        });
        
        // Auto remove after duration
        setTimeout(() => {
            if (toast.parentElement) {
                toast.classList.add('toast-exit');
                setTimeout(() => toast.remove(), 300);
            }
        }, duration);
        
        return toast;
    };

    // Shortcut methods
    window.toastSuccess = function(message, title = 'Success!') {
        return window.showToast(title, message, 'success');
    };

    window.toastError = function(message, title = 'Error!') {
        return window.showToast(title, message, 'error');
    };

    window.toastWarning = function(message, title = 'Warning!') {
        return window.showToast(title, message, 'warning');
    };

    window.toastInfo = function(message, title = 'Info') {
        return window.showToast(title, message, 'info');
    };
})();
</script>

<style>
.toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 2100;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.toast {
    min-width: 280px;
    max-width: 400px;
    background: #FFFFFF;
    border-radius: 16px;
    padding: 1rem 1.25rem;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideInRight 0.3s ease;
    border-left: 4px solid;
}

.toast-success {
    border-left-color: #22C55E;
    background: linear-gradient(135deg, #FFFFFF, #F0FDF4);
}

.toast-error {
    border-left-color: #EF4444;
    background: linear-gradient(135deg, #FFFFFF, #FEF2F2);
}

.toast-warning {
    border-left-color: #F59E0B;
    background: linear-gradient(135deg, #FFFFFF, #FFFBEB);
}

.toast-info {
    border-left-color: #3B82F6;
    background: linear-gradient(135deg, #FFFFFF, #EFF6FF);
}

.toast-icon {
    font-size: 1.25rem;
    flex-shrink: 0;
}

.toast-success .toast-icon {
    color: #22C55E;
}

.toast-error .toast-icon {
    color: #EF4444;
}

.toast-warning .toast-icon {
    color: #F59E0B;
}

.toast-info .toast-icon {
    color: #3B82F6;
}

.toast-content {
    flex: 1;
}

.toast-title {
    font-weight: 700;
    font-size: 0.9rem;
    color: #1E293B;
    margin-bottom: 2px;
}

.toast-message {
    font-size: 0.8rem;
    color: #475569;
}

.toast-close {
    background: none;
    border: none;
    color: #94A3B8;
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    transition: color 0.2s;
    flex-shrink: 0;
}

.toast-close:hover {
    color: #1E293B;
}

@keyframes slideInRight {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes slideOutRight {
    from {
        transform: translateX(0);
        opacity: 1;
    }
    to {
        transform: translateX(100%);
        opacity: 0;
    }
}

.toast-exit {
    animation: slideOutRight 0.3s ease forwards;
}

/* Responsive Toast */
@media (max-width: 640px) {
    .toast-container {
        left: 20px;
        right: 20px;
    }
    
    .toast {
        min-width: auto;
        max-width: none;
        width: 100%;
    }
}
</style>
