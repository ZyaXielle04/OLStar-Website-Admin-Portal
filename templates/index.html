<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>OLStar Management Portal | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231f2c34'><path d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/></svg>">
</head>
<body>
    <div class="background-gradient"></div>
    
    <main class="login-container">
        <div class="login-card">
            <div class="card-header">
                <div class="logo-mark">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#7898aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 2v5M12 14v5" stroke="#7898aa" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="icon-marker"></div>
                <h1 class="login-title">OLStar Management Portal</h1>
                <p class="login-subtitle">Secure access for authorized personnel only!</p>
            </div>

            <form id="loginForm" class="login-form" novalidate>
                <div class="input-group">
                    <label for="email" class="input-label">
                        <span>email address</span>
                        <span class="label-required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" class="input-field" 
                               placeholder="name@company.com" autocomplete="email" autofocus>
                        <span class="input-focus-bg"></span>
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                        </span>
                    </div>
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="input-group">
                    <label for="password" class="input-label">
                        <span>password</span>
                        <span class="label-required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="input-field" 
                               placeholder="••••••••" autocomplete="current-password">
                        <span class="input-focus-bg"></span>
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        <span class="checkbox-text">remember this device</span>
                    </label>
                    <a href="#" class="forgot-link" id="forgotPasswordLink">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 4px;">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 16v-4M12 8h.01"/>
                        </svg>
                        forgot password?
                    </a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">sign in</span>
                    <span class="btn-shine"></span>
                    <span class="btn-loader" style="display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 2a10 10 0 1 0 10 10"/>
                        </svg>
                    </span>
                </button>

                <div class="security-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <span>256-bit SSL encrypted connection</span>
                </div>

                <div class="portal-info">
                    <span class="info-dot"></span>
                    <span>Accounts are provisioned by system administrators</span>
                </div>
            </form>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
